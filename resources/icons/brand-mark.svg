<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="brandGradient" x1="8" y1="8" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5F9785"/>
      <stop offset="1" stop-color="#477766"/>
    </linearGradient>
    <linearGradient id="brandHighlight" x1="32" y1="4" x2="32" y2="15" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="brandShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#173A2F" flood-opacity="0.24"/>
    </filter>
  </defs>

  <rect x="4" y="4" width="56" height="56" rx="18" fill="url(#brandGradient)" filter="url(#brandShadow)"/>
  <rect x="4" y="4" width="56" height="10" rx="18" fill="url(#brandHighlight)"/>
  <circle cx="32" cy="31" r="8" fill="#EAF5F1"/>
</svg>
